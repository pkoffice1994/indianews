{% extends "base.html" %}
{% block title %}{{ page.title }} | इंडिया न्यूज़{% endblock %}
{% block content %}
<div class="container page-wrap">
  <div style="max-width:860px">
    <h1 style="font-size:28px;font-weight:700;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--border)">{{ page.title }}</h1>
    <div style="font-size:16px;line-height:1.9;color:var(--ink)">{{ page.content|safe }}</div>
  </div>
</div>
{% endblock %}
